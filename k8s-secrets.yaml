# ── Kubernetes Secrets for RCA Agent ─────────────────────────────
# Store sensitive credentials as K8s Secrets (NOT in ConfigMap).
#
# IMPORTANT: Never commit real values to git.
# Use one of these approaches for GKE production:
#   1. GCP Secret Manager + External Secrets Operator (recommended)
#   2. kubectl create secret (manual)
#   3. Sealed Secrets (GitOps)
#
# Option 1 — create the secret via kubectl (substitute real values):
#
#   kubectl create secret generic rca-agent-secrets \
#     --namespace=rca-agent \
#     --from-literal=SERVICENOW_INSTANCE=https://myco.service-now.com \
#     --from-literal=SERVICENOW_USERNAME=svc_rca_agent \
#     --from-literal=SERVICENOW_PASSWORD=xxxx \
#     --from-literal=CONFLUENCE_BASE_URL=https://myco.atlassian.net/wiki \
#     --from-literal=CONFLUENCE_USERNAME=sre@myco.com \
#     --from-literal=CONFLUENCE_API_TOKEN=xxxx \
#     --from-literal=CONFLUENCE_SPACE_KEY=SRE \
#     --from-literal=CONFLUENCE_PARENT_PAGE_ID=123456789
#
# The template below shows the structure only — values are placeholders.
# Apply with:  kubectl apply -f k8s-secrets.yaml
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rca-agent-secrets
  namespace: rca-agent
type: Opaque
stringData:
  SERVICENOW_INSTANCE:      "https://YOUR_INSTANCE.service-now.com"
  SERVICENOW_USERNAME:      "YOUR_SN_USERNAME"
  SERVICENOW_PASSWORD:      "YOUR_SN_PASSWORD"
  CONFLUENCE_BASE_URL:      "https://YOUR_ORG.atlassian.net/wiki"
  CONFLUENCE_USERNAME:      "YOUR_EMAIL@company.com"
  CONFLUENCE_API_TOKEN:     "YOUR_ATLASSIAN_API_TOKEN"
  CONFLUENCE_SPACE_KEY:     "SRE"
  CONFLUENCE_PARENT_PAGE_ID: "123456789"
