steps:
  # ── Build backend ─────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - --platform=linux/amd64
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-backend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-backend:latest
      - -f
      - backend/Dockerfile
      - ./backend

  # ── Build frontend ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --platform=linux/amd64
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-frontend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-frontend:latest
      - -f
      - frontend/Dockerfile
      - ./frontend

  # ── Push both ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-backend]
    waitFor: [build-backend]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-frontend]
    waitFor: [build-frontend]

  # ── Deploy backend to Cloud Run ───────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rca-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION},GEMINI_MODEL=${_GEMINI_MODEL},CORS_ORIGINS=${_FRONTEND_URL}
    waitFor: [push-backend]

  # ── Get backend URL ───────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe rca-backend \
          --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $BACKEND_URL"
        echo $BACKEND_URL > /workspace/backend_url.txt
    waitFor: [deploy-backend]

  # ── Deploy frontend to Cloud Run ──────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy rca-frontend \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/rca-frontend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars=VITE_API_URL=$BACKEND_URL
    waitFor: [get-backend-url, push-frontend]

substitutions:
  _REGION: us-central1
  _REPO: rca-agent
  _GEMINI_MODEL: gemini-1.5-pro
  _FRONTEND_URL: ""     # set after first deploy, e.g. https://rca-frontend-xxx-uc.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
