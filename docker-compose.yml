version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rca-backend:local
    container_name: rca-backend
    ports:
      - "8080:8080"
    env_file:
      - backend.env
    volumes:
      - ${HOME}/.config/gcloud:/tmp/gcloud:ro
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rca-frontend:local
    container_name: rca-frontend
    ports:
      - "8501:8501"
    env_file:
      - frontend.env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
