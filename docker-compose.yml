version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rca-backend:local
    container_name: rca-backend
    ports:
      - "8080:8080"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - CORS_ORIGINS=http://localhost:3000
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud:/tmp/gcloud:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rca-frontend:local
    container_name: rca-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
