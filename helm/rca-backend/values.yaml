# =============================================================================
# rca-backend — default values
# Override with: helm install rca-backend ./rca-backend -f my-values.yaml
# or:            helm install rca-backend ./rca-backend --set key=value
# =============================================================================

replicaCount: 2

image:
  repository: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/rca-agent/rca-backend
  tag: "latest"
  pullPolicy: IfNotPresent

# ── GCP / Vertex AI ──────────────────────────────────────────────
gcp:
  projectId: "YOUR_PROJECT_ID"
  location: "us-central1"
  geminiModel: "gemini-1.5-pro"

# ── ServiceNow ────────────────────────────────────────────────────
# Values here are used only if existingSecret is empty.
# In production, always use existingSecret.
servicenow:
  instance: ""        # https://your-instance.service-now.com
  username: ""
  password: ""

# ── Confluence ────────────────────────────────────────────────────
confluence:
  baseUrl: ""         # https://your-org.atlassian.net/wiki
  username: ""
  apiToken: ""
  spaceKey: "SRE"
  parentPageId: ""

# ── Existing K8s Secret (recommended for production) ─────────────
# If set, the chart reads credentials from this secret instead of
# the plaintext values above. Create with:
#   kubectl create secret generic rca-agent-secrets -n rca-agent \
#     --from-literal=SERVICENOW_INSTANCE=... \
#     --from-literal=SERVICENOW_USERNAME=... \
#     --from-literal=SERVICENOW_PASSWORD=... \
#     --from-literal=CONFLUENCE_BASE_URL=... \
#     --from-literal=CONFLUENCE_USERNAME=... \
#     --from-literal=CONFLUENCE_API_TOKEN=... \
#     --from-literal=CONFLUENCE_SPACE_KEY=... \
#     --from-literal=CONFLUENCE_PARENT_PAGE_ID=...
existingSecret: ""   # e.g. "rca-agent-secrets"

# ── Service ───────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "gce"
  annotations: {}
    # kubernetes.io/ingress.global-static-ip-name: rca-agent-ip
  hosts:
    - host: ""
      paths:
        - path: /api
          pathType: Prefix
        - path: /docs
          pathType: Prefix
        - path: /redoc
          pathType: Prefix
        - path: /health
          pathType: Prefix
  tls: []

# ── CORS ─────────────────────────────────────────────────────────
corsOrigins: "http://localhost:8501"

# ── Resources ────────────────────────────────────────────────────
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

# ── Autoscaling ───────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ── Workload Identity ─────────────────────────────────────────────
serviceAccount:
  create: true
  name: "rca-agent-sa"
  # GCP service account to bind via Workload Identity
  gcpServiceAccount: "rca-agent-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com"

# ── Probes ────────────────────────────────────────────────────────
readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20

# ── Pod settings ──────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext: {}
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: {}
tolerations: []
affinity: {}

# ── Namespace ─────────────────────────────────────────────────────
namespace:
  create: true
  name: "rca-agent"
