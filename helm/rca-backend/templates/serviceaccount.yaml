{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rca-backend.serviceAccountName" . }}
  namespace: {{ include "rca-backend.namespace" . }}
  labels:
    {{- include "rca-backend.labels" . | nindent 4 }}
  annotations:
    # Workload Identity binding — links this K8s SA to the GCP SA
    # so the pod gets Vertex AI credentials automatically with no key file
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
{{- end }}
