{{/*
Only create a Secret if existingSecret is NOT set and at least one
credential value is provided. In production use existingSecret instead.
*/}}
{{- if and (not .Values.existingSecret) (or .Values.servicenow.instance .Values.confluence.baseUrl) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rca-backend.fullname" . }}-secrets
  namespace: {{ include "rca-backend.namespace" . }}
  labels:
    {{- include "rca-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  SERVICENOW_INSTANCE:       {{ .Values.servicenow.instance | quote }}
  SERVICENOW_USERNAME:       {{ .Values.servicenow.username | quote }}
  SERVICENOW_PASSWORD:       {{ .Values.servicenow.password | quote }}
  CONFLUENCE_BASE_URL:       {{ .Values.confluence.baseUrl | quote }}
  CONFLUENCE_USERNAME:       {{ .Values.confluence.username | quote }}
  CONFLUENCE_API_TOKEN:      {{ .Values.confluence.apiToken | quote }}
  CONFLUENCE_SPACE_KEY:      {{ .Values.confluence.spaceKey | quote }}
  CONFLUENCE_PARENT_PAGE_ID: {{ .Values.confluence.parentPageId | quote }}
{{- end }}
