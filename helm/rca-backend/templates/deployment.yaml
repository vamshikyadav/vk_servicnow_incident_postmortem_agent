{{- $secretName := .Values.existingSecret | default (printf "%s-secrets" (include "rca-backend.fullname" .)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rca-backend.fullname" . }}
  namespace: {{ include "rca-backend.namespace" . }}
  labels:
    {{- include "rca-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rca-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rca-backend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rca-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            # ── Non-sensitive config from ConfigMap ──────────────
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rca-backend.fullname" . }}-config
                  key: GCP_PROJECT_ID
            - name: GCP_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rca-backend.fullname" . }}-config
                  key: GCP_LOCATION
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rca-backend.fullname" . }}-config
                  key: GEMINI_MODEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rca-backend.fullname" . }}-config
                  key: CORS_ORIGINS
            # ── Sensitive credentials from Secret ────────────────
            - name: SERVICENOW_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SERVICENOW_INSTANCE
            - name: SERVICENOW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SERVICENOW_USERNAME
            - name: SERVICENOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SERVICENOW_PASSWORD
            - name: CONFLUENCE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CONFLUENCE_BASE_URL
            - name: CONFLUENCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CONFLUENCE_USERNAME
            - name: CONFLUENCE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CONFLUENCE_API_TOKEN
            - name: CONFLUENCE_SPACE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CONFLUENCE_SPACE_KEY
            - name: CONFLUENCE_PARENT_PAGE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CONFLUENCE_PARENT_PAGE_ID
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
