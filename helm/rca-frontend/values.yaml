# =============================================================================
# rca-frontend — default values
# =============================================================================

replicaCount: 2

image:
  repository: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/rca-agent/rca-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Backend connection ────────────────────────────────────────────
# URL the Streamlit app uses to call the FastAPI backend.
# Inside GKE cluster: use the backend service DNS name.
# From outside: use the Ingress / LoadBalancer URL.
backendUrl: "http://rca-backend.rca-agent.svc.cluster.local"

# ── Service ───────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8501

# ── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "gce"
  annotations: {}
    # kubernetes.io/ingress.global-static-ip-name: rca-agent-ip
    # networking.gke.io/managed-certificates: rca-agent-cert
  hosts:
    - host: ""         # leave empty for IP-based access
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Resources ────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── Autoscaling ───────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ── Probes ────────────────────────────────────────────────────────
readinessProbe:
  httpGet:
    path: /_stcore/health
    port: 8501
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /_stcore/health
    port: 8501
  initialDelaySeconds: 15
  periodSeconds: 20

# ── Pod settings ──────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext: {}
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

serviceAccount:
  create: false
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

# ── Namespace ─────────────────────────────────────────────────────
# Should match the backend namespace
namespace:
  create: false     # backend chart creates it — set true if deploying frontend first
  name: "rca-agent"
