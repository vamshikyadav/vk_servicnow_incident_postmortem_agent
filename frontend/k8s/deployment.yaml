apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-frontend
  namespace: rca-agent
  labels:
    app: rca-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rca-frontend
  template:
    metadata:
      labels:
        app: rca-frontend
    spec:
      containers:
        - name: rca-frontend
          image: REGION-docker.pkg.dev/PROJECT_ID/rca-agent/rca-frontend:latest
          ports:
            - containerPort: 80
          env:
            # This tells the React app where the backend is.
            # Injected at container start by docker-entrypoint.sh.
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: rca-config
                  key: BACKEND_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rca-frontend
  namespace: rca-agent
spec:
  selector:
    app: rca-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rca-ingress
  namespace: rca-agent
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "rca-agent-ip"   # reserve first with gcloud
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rca-frontend
                port:
                  number: 80
