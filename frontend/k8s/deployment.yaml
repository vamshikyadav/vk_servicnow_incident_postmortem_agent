apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-frontend
  namespace: rca-agent
  labels:
    app: rca-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rca-frontend
  template:
    metadata:
      labels:
        app: rca-frontend
    spec:
      containers:
        - name: rca-frontend
          image: REGION-docker.pkg.dev/PROJECT_ID/rca-agent/rca-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: rca-config
                  key: BACKEND_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rca-frontend
  namespace: rca-agent
spec:
  selector:
    app: rca-frontend
  ports:
    - port: 80
      targetPort: 8501
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rca-ingress
  namespace: rca-agent
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "rca-agent-ip"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: rca-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rca-frontend
                port:
                  number: 80
