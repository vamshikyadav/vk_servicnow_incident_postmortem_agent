server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject BACKEND_URL into the built JS at container start.
    # The entrypoint script replaces __VITE_API_URL_PLACEHOLDER__ with
    # the value of the VITE_API_URL environment variable.
    # This avoids having to rebuild the image per environment.

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Cloud Run / GKE probes
    location /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
